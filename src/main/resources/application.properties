#Sun May 17 20:28:46 UTC 2026
micronaut.application.name=restaurant
micronaut.server.port=8040

# PostgreSQL
datasources.default.url=jdbc:postgresql://localhost:5433/restaurant
datasources.default.username=restaurant_user
datasources.default.password=restaurant_pass
datasources.default.driver-class-name=org.postgresql.Driver
datasources.default.db-type=postgres
datasources.default.dialect=POSTGRES
datasources.default.schema-generate=NONE

# RabbitMQ
rabbitmq.uri=amqp://restaurant_user:restaurant_pass@localhost:5672
rabbitmq.exchanges.order-exchange.type=direct
rabbitmq.exchanges.order-exchange.durable=true

rabbitmq.queues.chef1-queue.durable=true
rabbitmq.queues.chef2-queue.durable=true
rabbitmq.queues.chef3-queue.durable=true
rabbitmq.queues.billing-queue.durable=true
rabbitmq.queues.notification-queue.durable=true

# Telegram bot
telegram.bot.token=${TELE_BOT_TOKEN}
telegram.bot.username=Krestaurant_bot